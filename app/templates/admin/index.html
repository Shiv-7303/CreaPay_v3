<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - CreaPay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: {
                  purple: '#6C47FF',
                  light: '#EDE9FF'
                }
              }
            }
          }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen font-sans antialiased">
    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-2xl font-bold text-brand-purple tracking-tight">CreaPay Admin</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-500">Welcome, {{ current_user.full_name }} (Admin)</span>
                    <a href="{{ url_for('dashboard.index') }}" class="text-sm font-medium text-gray-600 hover:text-brand-purple transition">User Dashboard</a>
                    <form action="{{ url_for('auth.logout') }}" method="POST" class="inline">
                        <button type="submit" class="text-sm font-medium text-red-600 hover:text-red-800 transition">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- Section 2: Revenue Stats -->
        <section class="mb-10">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Revenue & Usage Stats</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4" id="stats-container">
                <!-- Populated by JS -->
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm animate-pulse">
                    <div class="h-4 bg-gray-200 rounded w-1/2 mb-2"></div>
                    <div class="h-8 bg-gray-200 rounded w-1/3"></div>
                </div>
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm animate-pulse">
                    <div class="h-4 bg-gray-200 rounded w-1/2 mb-2"></div>
                    <div class="h-8 bg-gray-200 rounded w-1/3"></div>
                </div>
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm animate-pulse">
                    <div class="h-4 bg-gray-200 rounded w-1/2 mb-2"></div>
                    <div class="h-8 bg-gray-200 rounded w-1/3"></div>
                </div>
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm animate-pulse">
                    <div class="h-4 bg-gray-200 rounded w-1/2 mb-2"></div>
                    <div class="h-8 bg-gray-200 rounded w-1/3"></div>
                </div>
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm animate-pulse">
                    <div class="h-4 bg-gray-200 rounded w-1/2 mb-2"></div>
                    <div class="h-8 bg-gray-200 rounded w-1/3"></div>
                </div>
            </div>
        </section>

        <!-- Section 3: Recent signups -->
        <section class="mb-10">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Recent Signups (Last 10)</h2>
            <div class="bg-white shadow-sm border border-gray-200 rounded-xl overflow-hidden">
                <ul id="recent-signups-list" class="divide-y divide-gray-200">
                    <!-- Populated by JS -->
                    <li class="p-4 animate-pulse">
                        <div class="h-4 bg-gray-200 rounded w-1/3 mb-1"></div>
                        <div class="h-3 bg-gray-200 rounded w-1/4"></div>
                    </li>
                </ul>
            </div>
        </section>

        <!-- Section 1: User Management -->
        <section>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold text-gray-800">User Management</h2>
                <div>
                    <label for="plan-filter" class="mr-2 text-sm font-medium text-gray-700">Filter by Plan:</label>
                    <select id="plan-filter" class="border border-gray-300 rounded-md p-2 text-sm focus:ring-brand-purple focus:border-brand-purple outline-none">
                        <option value="all">All</option>
                        <option value="free">Free</option>
                        <option value="pro">Pro</option>
                    </select>
                </div>
            </div>

            <div class="bg-white shadow-sm border border-gray-200 rounded-xl overflow-hidden overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Full Name</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Plan</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Deals Count</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer group" id="sort-date">
                                Joined Date
                                <span class="text-gray-400 group-hover:text-gray-600 ml-1">↓</span>
                            </th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body" class="bg-white divide-y divide-gray-200">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadUsers();

            document.getElementById('plan-filter').addEventListener('change', (e) => {
                loadUsers(e.target.value);
            });
        });

        async function loadStats() {
            try {
                const response = await fetch('/admin/api/stats');
                if (!response.ok) throw new Error('Failed to load stats');
                const data = await response.json();

                const container = document.getElementById('stats-container');
                container.innerHTML = `
                    <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                        <h3 class="text-sm font-medium text-gray-500 mb-1">Total Signups</h3>
                        <p class="text-2xl font-bold text-gray-900">${data.total_signups}</p>
                    </div>
                    <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                        <h3 class="text-sm font-medium text-gray-500 mb-1">Pro Users</h3>
                        <p class="text-2xl font-bold text-gray-900">${data.total_pro_users}</p>
                    </div>
                    <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                        <h3 class="text-sm font-medium text-gray-500 mb-1">MRR</h3>
                        <p class="text-2xl font-bold text-brand-purple">₹${data.mrr}</p>
                    </div>
                    <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                        <h3 class="text-sm font-medium text-gray-500 mb-1">Total Deals</h3>
                        <p class="text-2xl font-bold text-gray-900">${data.total_deals_created}</p>
                    </div>
                    <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                        <h3 class="text-sm font-medium text-gray-500 mb-1">Active Deals</h3>
                        <p class="text-2xl font-bold text-gray-900">${data.active_deals}</p>
                    </div>
                `;
            } catch (error) {
                console.error(error);
            }
        }

        async function loadUsers(planFilter = 'all') {
            try {
                let url = '/admin/api/users';
                if (planFilter !== 'all') {
                    url += `?plan=${planFilter}`;
                }

                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to load users');
                const users = await response.json();

                // Populate users table
                const tbody = document.getElementById('users-table-body');
                tbody.innerHTML = '';

                users.forEach(user => {
                    const date = new Date(user.joined_date);
                    const formattedDate = date.toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

                    const planBadge = user.plan === 'pro'
                        ? `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-brand-light text-brand-purple">Pro</span>`
                        : `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-gray-100 text-gray-800">Free</span>`;

                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${user.email}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${user.full_name}</td>
                            <td class="px-6 py-4 whitespace-nowrap">${planBadge}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${user.deals_count}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${formattedDate}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                <a href="#" class="text-brand-purple hover:text-purple-900">View</a>
                            </td>
                        </tr>
                    `;
                });

                // Populate recent signups (if all users loaded, take first 10, assuming API returns sorted by created_at desc)
                if (planFilter === 'all') {
                    const recentList = document.getElementById('recent-signups-list');
                    recentList.innerHTML = '';
                    const recentUsers = users.slice(0, 10);

                    if (recentUsers.length === 0) {
                        recentList.innerHTML = '<li class="p-4 text-sm text-gray-500">No signups yet.</li>';
                    } else {
                        recentUsers.forEach(user => {
                            const date = new Date(user.joined_date);
                            const formattedDate = date.toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                            recentList.innerHTML += `
                                <li class="p-4 hover:bg-gray-50">
                                    <div class="flex items-center justify-between">
                                        <div>
                                            <p class="text-sm font-medium text-gray-900">${user.full_name} <span class="text-gray-500 font-normal">(${user.email})</span></p>
                                        </div>
                                        <div class="text-sm text-gray-500">
                                            Joined ${formattedDate}
                                        </div>
                                    </div>
                                </li>
                            `;
                        });
                    }
                }

            } catch (error) {
                console.error(error);
            }
        }
    </script>
</body>
</html>
