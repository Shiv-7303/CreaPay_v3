version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/creapay
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - FLASK_APP=run.py
      - FLASK_ENV=development
      - SECRET_KEY=dev_secret_key_change_me
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "flask --app app db upgrade && 
             gunicorn 'app:create_app(\"development\")' --bind 0.0.0.0:8000 --reload"

  worker:
    build: .
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/creapay
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - FLASK_APP=run.py
      - FLASK_ENV=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A celery_worker.celery worker --loglevel=info

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=creapay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
