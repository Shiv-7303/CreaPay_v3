services:
  - type: worker
    name: CreaPay-Celery
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A celery_worker.celery worker --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: CreaPay-DB
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: CreaPay-Redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: CreaPay-Redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: CreaPay-Redis
          property: connectionString
      - key: FLASK_APP
        value: run.py
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: CreaPay-Web
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn "app:create_app('production')" --bind 0.0.0.0:8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: CreaPay-DB
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: CreaPay-Redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: CreaPay-Redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: CreaPay-Redis
          property: connectionString
      - key: FLASK_APP
        value: run.py
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
